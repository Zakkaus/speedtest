<!doctype html>
<html lang="zh-cn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Gentoo 中文社区 · 测速</title>
<meta name="description" content="测一下你到 Gentoo 中文社区镜像站（海外）的实际下载 / 上传速度与延迟。">
<link rel="icon" href="logo.webp">
<script>
/* 首屏前先定主题，避免闪烁。light/dark 写属性，system 不写（交给系统媒体查询）。 */
(function () {
  try { var t = localStorage.getItem('speed-theme'); if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t); } catch (e) {}
})();
</script>
<style>
:root {
  color-scheme: light dark;
  --primary: hsl(252 27% 38%);
  --bg: #ffffff; --fg: #111827; --fg-body: #374151; --fg-soft: #6b7280;
  --border: #e5e7eb; --card: #ffffff; --hover: rgba(0,0,0,0.05); --track: rgba(0,0,0,0.07);
}
:root[data-theme="dark"] {
  color-scheme: dark; --primary: hsl(252 32% 64%);
  --bg: #111111; --fg: #f3f4f6; --fg-body: #d1d5db; --fg-soft: #9ca3af;
  --border: #383838; --card: #1b1b1b; --hover: rgba(255,255,255,0.08); --track: rgba(255,255,255,0.1);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    color-scheme: dark; --primary: hsl(252 32% 64%);
    --bg: #111111; --fg: #f3f4f6; --fg-body: #d1d5db; --fg-soft: #9ca3af;
    --border: #383838; --card: #1b1b1b; --hover: rgba(255,255,255,0.08); --track: rgba(255,255,255,0.1);
  }
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--fg-body); line-height: 1.7;
       font-family: system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans CJK SC","Microsoft YaHei",sans-serif; -webkit-font-smoothing: antialiased; }

.nav { position: sticky; top: 0; z-index: 40; border-bottom: 1px solid var(--border);
       background: color-mix(in srgb, var(--bg) 82%, transparent);
       -webkit-backdrop-filter: blur(12px) saturate(180%); backdrop-filter: blur(12px) saturate(180%); }
.nav-inner { max-width: 640px; margin: 0 auto; padding: 0.55rem 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; }
.nav-brand { display: inline-flex; align-items: center; gap: 0.55rem; text-decoration: none; color: var(--fg); min-width: 0; }
.nav-brand img { width: 28px; height: auto; flex: none; }
.nav-title { font-weight: 700; font-size: 0.95rem; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-controls { display: inline-flex; align-items: center; gap: 0.3rem; flex: none; }
.nav-link { color: var(--fg-soft); text-decoration: none; font-size: 0.86rem; font-weight: 600; padding: 0.32rem 0.5rem; border-radius: 0.4rem; white-space: nowrap; }
.nav-link:hover { background: var(--hover); color: var(--fg); }
.icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border: none; border-radius: 0.5rem; background: transparent; color: var(--fg-soft); cursor: pointer; }
.icon-btn:hover { background: var(--hover); color: var(--fg); }
.menu-wrap { position: relative; }
.menu { position: absolute; right: 0; top: calc(100% + 6px); min-width: 138px; background: var(--card); border: 1px solid var(--border);
        border-radius: 0.6rem; box-shadow: 0 10px 28px rgba(0,0,0,0.14); padding: 0.3rem; display: flex; flex-direction: column; gap: 0.1rem; z-index: 50; }
.menu[hidden] { display: none; }
.menu-item { display: flex; align-items: center; gap: 0.55rem; width: 100%; border: none; background: transparent; color: var(--fg-body);
             font: inherit; font-size: 0.86rem; padding: 0.42rem 0.6rem; border-radius: 0.4rem; cursor: pointer; text-align: left; }
.menu-item:hover { background: var(--hover); }
.menu-item.active { color: var(--primary); font-weight: 600; }
.menu-item svg { flex: none; }

.wrap { max-width: 640px; margin: 0 auto; padding: 2.6rem 1.25rem 1rem; text-align: center; }
.lead { color: var(--fg-soft); font-size: 0.95rem; margin: 0 0 1.9rem; }
.start { appearance: none; border: none; cursor: pointer; background: var(--primary); color: #fff; font-weight: 700; font-size: 1.02rem;
         padding: 0.85rem 2.4rem; border-radius: 9999px; transition: opacity 0.15s ease; font-family: inherit; }
.start:hover { opacity: 0.9; }
.start:disabled { opacity: 0.6; cursor: default; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; margin-top: 2.4rem; text-align: left; }
.metric { border: 1px solid var(--border); border-radius: 0.75rem; background: var(--card); padding: 1.05rem 1.25rem; }
.m-label { font-size: 0.82rem; color: var(--fg-soft); margin-bottom: 0.25rem; }
.m-val { display: flex; align-items: baseline; gap: 0.3rem; }
.m-num { font-size: 1.9rem; font-weight: 700; color: var(--fg); font-variant-numeric: tabular-nums; line-height: 1.1; }
.m-unit { font-size: 0.82rem; color: var(--fg-soft); }
.metric.live .m-num { color: var(--primary); }
.bar { margin-top: 0.7rem; height: 5px; border-radius: 9999px; background: var(--track); overflow: hidden; }
.bar > i { display: block; height: 100%; width: 0; background: var(--primary); border-radius: 9999px; transition: width 0.2s ease; }
.ipline { margin-top: 1.5rem; font-size: 0.8rem; color: var(--fg-soft); min-height: 1.2em; }
.ipline code { font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }

.foot { max-width: 640px; margin: 2rem auto 0; padding: 1.3rem 1.25rem 2.6rem; border-top: 1px solid var(--border);
        font-size: 0.82rem; color: var(--fg-soft); text-align: center; }
.foot a { color: var(--primary); text-decoration: none; }
.foot a:hover { text-decoration: underline; }
@media (max-width: 480px) { .nav-title { display: none; } }
</style>
</head>
<body>
<header class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="/">
      <img src="logo.webp" alt="">
      <span class="nav-title">Gentoo 中文社区 · 测速</span>
    </a>
    <nav class="nav-controls" aria-label="站点设置">
      <a class="nav-link" href="https://mirror.gentoozh.org/">下载镜像</a>
      <span class="menu-wrap" id="theme-wrap"></span>
    </nav>
  </div>
</header>

<main class="wrap">
  <p class="lead">测测你到本镜像站（海外）的实际速度。</p>
  <button class="start" id="start" type="button">开始测速</button>

  <div class="grid">
    <div class="metric" id="m-ping"><div class="m-label">延迟</div><div class="m-val"><span class="m-num" id="ping">—</span><span class="m-unit">ms</span></div></div>
    <div class="metric" id="m-jit"><div class="m-label">抖动</div><div class="m-val"><span class="m-num" id="jit">—</span><span class="m-unit">ms</span></div></div>
    <div class="metric" id="m-dl"><div class="m-label">下载</div><div class="m-val"><span class="m-num" id="dl">—</span><span class="m-unit">Mbps</span></div><div class="bar"><i id="dlbar"></i></div></div>
    <div class="metric" id="m-ul"><div class="m-label">上传</div><div class="m-val"><span class="m-num" id="ul">—</span><span class="m-unit">Mbps</span></div><div class="bar"><i id="ulbar"></i></div></div>
  </div>

  <div class="ipline" id="ipline"></div>
</main>

<footer class="foot">
  本测速基于 <a href="https://github.com/Zakkaus/speedtest">LibreSpeed</a>（开源）· <a href="https://mirror.gentoozh.org/">下载镜像</a>
</footer>

<script src="speedtest.js"></script>
<script>
(function () {
  /* —— 主题下拉（与镜像站同款：浅色 / 深色 / 跟随系统）—— */
  var THEME_LABEL = { light: '浅色', dark: '深色', system: '跟随系统' };
  var ICONS = {
    light: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>',
    dark: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>',
    system: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>'
  };
  function store(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
  function read(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
  var themeMode = read('speed-theme') || 'system';
  var wrap = document.getElementById('theme-wrap');
  var btn = document.createElement('button');
  btn.type = 'button'; btn.className = 'icon-btn'; btn.setAttribute('aria-haspopup', 'true'); btn.setAttribute('aria-expanded', 'false');
  var menu = document.createElement('div'); menu.className = 'menu'; menu.setAttribute('role', 'menu'); menu.hidden = true;
  var items = {};
  ['light', 'dark', 'system'].forEach(function (m) {
    var it = document.createElement('button');
    it.type = 'button'; it.className = 'menu-item'; it.setAttribute('role', 'menuitemradio');
    it.innerHTML = ICONS[m] + '<span>' + THEME_LABEL[m] + '</span>';
    it.addEventListener('click', function () { applyTheme(m); closeMenu(); btn.focus(); });
    menu.appendChild(it); items[m] = it;
  });
  btn.addEventListener('click', function (e) { e.stopPropagation(); if (menu.hidden) { menu.hidden = false; btn.setAttribute('aria-expanded', 'true'); } else closeMenu(); });
  function closeMenu() { menu.hidden = true; btn.setAttribute('aria-expanded', 'false'); }
  document.addEventListener('click', function (e) { if (!wrap.contains(e.target)) closeMenu(); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeMenu(); });
  wrap.appendChild(btn); wrap.appendChild(menu);
  function applyTheme(mode) {
    themeMode = mode;
    if (mode === 'light' || mode === 'dark') document.documentElement.setAttribute('data-theme', mode);
    else document.documentElement.removeAttribute('data-theme');
    store('speed-theme', mode);
    btn.innerHTML = ICONS[mode]; btn.title = '主题：' + THEME_LABEL[mode];
    ['light', 'dark', 'system'].forEach(function (m) { items[m].classList.toggle('active', m === mode); });
  }
  applyTheme(themeMode);

  /* —— 测速（LibreSpeed 引擎，每次新建实例）—— */
  var startBtn = document.getElementById('start');
  var elPing = document.getElementById('ping'), elJit = document.getElementById('jit'),
      elDl = document.getElementById('dl'), elUl = document.getElementById('ul'),
      elDlBar = document.getElementById('dlbar'), elUlBar = document.getElementById('ulbar'),
      elIp = document.getElementById('ipline');
  var mDl = document.getElementById('m-dl'), mUl = document.getElementById('m-ul'),
      mPing = document.getElementById('m-ping'), mJit = document.getElementById('m-jit');
  var running = false;

  function num(v) { var n = Number(v); return isFinite(n) ? n : 0; }
  function fmt(v) { var n = num(v); return n > 0 ? n.toFixed(2) : '—'; }
  function reset() {
    elPing.textContent = elJit.textContent = elDl.textContent = elUl.textContent = '—';
    elDlBar.style.width = elUlBar.style.width = '0';
    [mDl, mUl, mPing, mJit].forEach(function (m) { m.classList.remove('live'); });
    elIp.textContent = '';
  }

  function run() {
    var s = new Speedtest();
    s.setParameter('telemetry_level', 'none');
    s.onupdate = function (d) {
      if (num(d.pingStatus) > 0) elPing.textContent = num(d.pingStatus).toFixed(1);
      if (num(d.jitterStatus) > 0) elJit.textContent = num(d.jitterStatus).toFixed(1);
      elDl.textContent = fmt(d.dlStatus);
      elUl.textContent = fmt(d.ulStatus);
      var dp = num(d.dlProgress), up = num(d.ulProgress);
      elDlBar.style.width = Math.min(dp, 1) * 100 + '%';
      elUlBar.style.width = Math.min(up, 1) * 100 + '%';
      // 高亮当前进行的阶段
      mPing.classList.toggle('live', d.testState === 2);
      mJit.classList.toggle('live', d.testState === 2);
      mDl.classList.toggle('live', d.testState === 1);
      mUl.classList.toggle('live', d.testState === 3);
      if (d.clientIp) elIp.innerHTML = '你的 IP：<code>' + String(d.clientIp).trim().split(' ')[0] + '</code>';
    };
    s.onend = function () {
      running = false;
      startBtn.disabled = false;
      startBtn.textContent = '再测一次';
      [mDl, mUl, mPing, mJit].forEach(function (m) { m.classList.remove('live'); });
      elDlBar.style.width = elUlBar.style.width = '100%';
    };
    s.start();
  }
  startBtn.addEventListener('click', function () {
    if (running) return;
    running = true; startBtn.disabled = true; startBtn.textContent = '测试中…';
    reset(); run();
  });
})();
</script>
</body>
</html>
